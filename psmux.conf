set -g mouse on
# Forward the mouse wheel to the running app instead of grabbing it for psmux
# copy-mode. Full-screen TUIs (lazygit, less, nvim) scroll their own panes
# correctly with this off; the cost is the wheel no longer opens scrollback in a
# plain shell pane (use Prefix + [ for that).
set -g scroll-enter-copy-mode off

# Terminal behavior (native Windows / psmux under Windows Terminal).
set -g default-terminal "xterm-256color"
# escape-time 0 swallowed Escape before it reached TUI
# apps like Claude Code / nvim; 50ms is fast but reliable. psmux default is 500.
set -g escape-time 50
set -g focus-events on
set -g allow-passthrough on
# paste-detection reassembles Windows clipboard injection (Ctrl+V -> char
# stream) into a single bracketed paste, which multiline paste in Claude Code /
# TUIs needs; with it off, the first newline submits early. Keep it on. The cost
# is psmux eats Ctrl+V at the console layer, so nvim can't use it for
# visual-block -- nvim remaps that to Ctrl+b when PSMUX_SESSION is set instead.
set -g paste-detection on

# -- theme (ported from oh-my-tmux look) ---------------------------------------
# Powerline separators are written as \u escapes so psmux expands them at load;
# raw glyphs do not survive file encoding on Windows. Needs a Nerd/Powerline font.
#    = right-pointing arrow         = left-pointing arrow
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom

# base status bar: yellow text on black
set -g status-style "bg=colour0,fg=colour3,none"
set -g status-left-length 40
set -g status-right-length 80

# left: session name, black on cyan, with a right-pointing powerline cap
set -g status-left "#[fg=colour0,bg=colour6,bold]  #S #[fg=colour6,bg=colour0,nobold]"

# inactive windows: cyan on gray
set -g window-status-format "#[fg=colour0,bg=colour8]#[fg=#{?window_last_flag,colour11,colour4},bg=colour8] #I #W #[fg=colour8,bg=colour0,nobold]"

# current window: black on yellow, powerline caps both sides
set -g window-status-current-format "#[fg=colour0,bg=colour3]#[fg=colour0,bg=colour3,bold] #I #W #[fg=colour3,bg=colour0,nobold]"

set -g window-status-separator ""

# right: prefix indicator | time | date | user, with left-pointing caps
set -g status-right "#[fg=colour8,bg=colour0]#[fg=colour15,bg=colour8] #{?client_prefix,⌨ ,}%R #[fg=colour6,bg=colour8]#[fg=colour0,bg=colour6,bold] %d %b "

# message / command-prompt styling (black on yellow, like oh-my-tmux)
set -g message-style "fg=colour0,bg=colour5,bold"
set -g message-command-style "fg=colour5,bg=colour0,bold"

# mode (copy-mode selection) styling
set -g mode-style "fg=colour0,bg=colour5,bold"

# pane borders: gray inactive, cyan active
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"
# -- end theme -----------------------------------------------------------------

bind R source-file ~/.psmux.conf \; display-message "Config reloaded..."

# start window/pane numbering at 1, keep numbers gap-free when one closes.
# NOTE: psmux mis-parses an inline "# comment" after a boolean value (reads
# it as off), so keep these comments on their own lines.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mode-keys vi
set -g status-keys vi

unbind -T prefix j
unbind -T prefix k
unbind -T prefix l
bind-key -T prefix j select-window -t :1
bind-key -T prefix k select-window -t :2
bind-key -T prefix l select-window -t :3
bind-key -T prefix ';' select-window -t :4

# pane resize on shifted hjkl (lowercase hjkl is used for window select above)
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix L resize-pane -R 5

# window selection for swapped number/symbol layout
bind-key -T prefix ')' select-window -t :0
bind-key -T prefix '!' select-window -t :1
bind-key -T prefix '@' select-window -t :2
bind-key -T prefix '#' select-window -t :3
bind-key -T prefix '$' select-window -t :4
bind-key -T prefix '%' select-window -t :5
bind-key -T prefix '^' select-window -t :6
bind-key -T prefix '&' select-window -t :7
bind-key -T prefix '*' select-window -t :8
bind-key -T prefix '(' select-window -t :9

# rebind default symbol commands to number keys for swapped layout
bind-key -T prefix 1 break-pane
bind-key -T prefix 3 list-buffers
bind-key -T prefix 4 command-prompt -I "#S" "rename-session -- '%%'"
bind-key -T prefix 5 split-window -h
bind-key -T prefix 7 confirm-before -p "kill-window #W? (y/n)" kill-window
bind-key -T prefix 9 switch-client -p
bind-key -T prefix 0 switch-client -n
